# Research Configuration
# Edit this file to customize the pipeline for your research topic.
# Every setting from across all pipeline stages is centralized here.

research:
  title: "Scholarly Communication & Research Security (2010-2024)"
  description: >
    A scientometric analysis examining the intersection of scholarly communication
    and research security in academic contexts, including open science, data sharing,
    and cybersecurity in research institutions.

  search_query: |
    (
        "open science" OR "open access publishing" OR "scholarly communication"
        OR "research data repository" OR "open research data"
        OR "institutional repository" OR "academic publishing"
    )
    AND
    (
        "research security" OR ransomware OR "data breach"
        OR "cyber attack" OR "information security"
    )
    AND
    (
        university OR academia OR scholarly OR researcher
        OR "research institution" OR library
    )

  start_year: 2010
  end_year: 2025
  max_results: 5000
  email: "amarnathdevraj2005@gmail.com"

cleaning:
  enabled: true

  # Papers mentioning these terms will be removed
  hard_exclusions:
    - smart farming
    - smart agriculture
    - precision farming
    - smart grid
    - power system
    - 6g
    - 5g
    - vehicular network
    - vanet
    - cellular network
    - industrial iot
    - iiot
    - scada
    - clinical
    - patient data
    - hospital security
    - medical imaging
    - healthcare delivery
    - smart city
    - smart home
    - smart building
    - blockchain infrastructure
    - cryptocurrency
    - bitcoin
    - ethereum
    - autonomous vehicle
    - self-driving
    - uav security
    - primary education
    - k-12
    - school children
    - ecommerce
    - marketing ai
    - consumer privacy

  # Papers must relate to at least one of these core concepts
  core_concepts:
    - open science
    - open access
    - scholarly communication
    - research security
    - academic cybersecurity
    - university security
    - repository
    - repositories
    - digital library
    - research integrity
    - scientific integrity
    - academic integrity
    - data sharing
    - fair data
    - open data
    - research data management
    - scientometrics
    - bibliometrics
    - scholarly publishing
    - peer review
    - preprint
    - academic publishing

  # Papers must mention at least one academic context keyword
  context_keywords:
    - university
    - academia
    - higher education
    - scholarly
    - researcher
    - faculty
    - campus
    - academic institution
    - scientific community
    - research organization

  # High-priority concepts that keep a paper regardless of other context
  high_priority_concepts:
    - open science
    - fair data
    - research integrity
    - scholarly communication
    - repositories

  # Security terms that require academic context to be relevant
  security_terms:
    - security
    - cybersecurity
    - cyber attack
    - ransomware
    - threat

embedding:
  model: "all-MiniLM-L6-v2"
  min_topic_size: 10
  top_n_topics: 20

llm:
  # Options: "ollama", "openai", "anthropic", or null to disable
  provider: "ollama"
  model: "gemma3:1b"
  api_key_env: null
  base_url: null

# Themes to track in temporal evolution.
# If empty, the pipeline auto-detects top themes from the data.
tracking:
  themes:
    - name: "Research Security"
      pattern: "research security|safeguarding research|national security"
    - name: "AI Governance"
      pattern: "ai governance|ai ethics|artificial intelligence governance|generative ai"
    - name: "Ransomware"
      pattern: "ransomware|cyber extortion|malware"
    - name: "Open Science"
      pattern: "open science|fair data|open access|scholarly communication"
    - name: "Cybersecurity"
      pattern: "cybersecurity|information security|cyber attack"

visualizations:
  annotations:
    enabled: true
    # Custom year annotations. Leave empty to auto-detect from data.
    custom:
      - year: 2020
        label: "COVID-19 Pandemic"
      - year: 2022
        label: "Generative AI Boom"
